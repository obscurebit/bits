status: review
intent: "Treat every bit as an artifact from the Obscure Bit archive: specimen, signal, form, myth, or corrupted record."

mode_defaults:
  signal:
    treatment: "frequency-map"
    material: "radio paper / oscilloscope trace / antenna shadow"
    gesture: "thin vertical bands, signal drift, small cyan instrument marks"
  archive:
    treatment: "ledger-fragment"
    material: "catalog card / onion-skin paper / accession stamp"
    gesture: "rules, tabs, offset labels, preservation marks"
  field_note:
    treatment: "specimen-study"
    material: "field notebook / specimen plate / location tag"
    gesture: "observation lines, pinned object, quiet color blocks"
  protocol:
    treatment: "document-scan"
    material: "municipal form / warning sticker / receipt stock"
    gesture: "check boxes, boxed instructions, bureaucratic geometry"
  myth:
    treatment: "ritual-diagram"
    material: "vellum chart / altar diagram / gold pencil"
    gesture: "centered geometry, sparse symbols, ceremonial spacing"
  glitch:
    treatment: "glitch-fragment"
    material: "thermal fax / broken UI / corrupted scanline"
    gesture: "offset blocks, damaged captions, fractured registration"

priority_workflow:
  hero:
    lane: "manual_hero"
    purpose: "cover candidates, sales preview plates, section-defining art"
  high:
    lane: "manual_hero"
    purpose: "story-defining plates and opener art that should feel hand-curated"
  medium:
    lane: "auto_draft"
    purpose: "generate strong drafts, then manually replace weak or generic results"
  standard:
    lane: "auto_draft"
    purpose: "coverage pass so every page has real visual material to design against"

