# Curated source lanes for Obscure Bit.
# The nightly job should explore neighborhoods of the web, not generic search-result sludge.

global:
  lane_order:
    - primary-doc
    - enthusiast-research
    - old-web
    - museum-object
    - local-history
    - niche-institution
    - indie-essay

  seed_queries:
    - '"forgotten project" "field notes" -site:medium.com -site:substack.com'
    - '"museum object" "odd history" -shop -store -product'
    - '"local history" "unusual artifact" -wikipedia'
    - '"independent research" "obscure history" -linkedin -youtube'

  lanes:
    primary-doc:
      seed_domains:
        - "bitsavers.org"
        - "textfiles.com"
        - "cryptomuseum.com"
        - "codesandciphers.org.uk"
      query_templates:
        - '"{theme_name}" "{primary_term}" "manual" -wikipedia -github'
        - '"{theme_name}" "{links_direction}" "field report" -site:.edu'
        - '"{theme_name}" "{primary_term}" "lab notes" -shop -store'

    enthusiast-research:
      seed_domains:
        - "vcfed.org"
        - "nycsubway.org"
        - "subbrit.org.uk"
        - "lowtechmagazine.com"
      query_templates:
        - '"{theme_name}" "{links_direction}" "independent research"'
        - '"{theme_name}" "{primary_term}" collector OR restoration'
        - '"{theme_name}" "{links_direction}" "field notes" -wikipedia'

    old-web:
      seed_domains:
        - "textfiles.com"
        - "404pagefound.com"
        - "lostmediawiki.com"
      query_templates:
        - '"{theme_name}" "{links_direction}" "personal site"'
        - '"{theme_name}" "{primary_term}" "homepage" -site:github.com'
        - '"{theme_name}" "{primary_term}" BBS OR webring'

    museum-object:
      seed_domains:
        - "wellcomecollection.org"
        - "collection.sciencemuseumgroup.org.uk"
        - "si.edu"
        - "computerhistory.org"
      query_templates:
        - '"{theme_name}" "{links_direction}" "museum object" -shop -store'
        - '"{theme_name}" "{primary_term}" "object record"'
        - '"{theme_name}" "{links_direction}" "collection item"'

    local-history:
      seed_domains:
        - "nycsubway.org"
        - "abandonedstations.org.uk"
        - "subbrit.org.uk"
        - "roadsideamerica.com"
      query_templates:
        - '"{theme_name}" "{links_direction}" "local history"'
        - '"{theme_name}" "{primary_term}" "historical society"'
        - '"{theme_name}" "{links_direction}" "oral history"'

    niche-institution:
      seed_domains:
        - "publicdomainreview.org"
        - "wellcomecollection.org"
        - "computerhistory.org"
        - "cabinetmagazine.org"
      query_templates:
        - '"{theme_name}" "{links_direction}" archive'
        - '"{theme_name}" "{primary_term}" "case study" -site:.edu'
        - '"{theme_name}" "{links_direction}" catalog'

    indie-essay:
      seed_domains:
        - "cabinetmagazine.org"
        - "lowtechmagazine.com"
        - "publicdomainreview.org"
      query_templates:
        - '"{theme_name}" "{links_direction}" essay'
        - '"{theme_name}" "{primary_term}" notes'
        - '"{theme_name}" "{links_direction}" "forgotten history"'

themes:
  forgotten technology:
    preferred_lanes:
      - primary-doc
      - enthusiast-research
      - old-web
      - museum-object
      - indie-essay
    seed_urls:
      - "https://calpaterson.com/bank-python.html"
      - "https://www.oldcomputers.net/kayproii.html"
      - "https://www.computerhistory.org/revolution/computer-graphics-music-and-art/15/224/643"
      - "https://120years.net/dubreq-stylophone/"
      - "https://archives.museumofplay.org/repositories/3/archival_objects/21782"
      - "https://gamesx.com/wiki/doku.php?id=repair:cdxdisassembly"
    seed_queries:
      - '"obsolete computer" "field notes" OR "oral history" -wikipedia'
      - '"dead standard" "manual" OR "operator guide" -github'
      - '"forgotten machine" restoration OR collector -youtube'
      - '"arcade hardware" repair OR "service manual"'
      - '"electronic instrument" "design history" prototype'
    focus_terms:
      - "obsolete computer"
      - "forgotten machine"
      - "dead standard"
      - "legacy system"
      - "obsolete hardware"
      - "historical patent"
      - "word processor"
      - "teletype"
      - "dial-up modem"
      - "bank python"
      - "triadex muse"
      - "kaypro"
      - "arcade hardware"
      - "game console"
      - "electronic instrument"
      - "industrial design"
      - "interface design"
      - "stylophone"
      - "pong"
      - "sega cdx"
    blocked_domains:
      - "99percentinvisible.org"
      - "lite.ip2location.com"
    drift_terms:
      - "worldbuilding"
      - "ball lightning"
      - "toynbee"
      - "dyatlov"
      - "taos hum"
      - "subscribe"
      - "podcast"
      - "rss"
    lane_overrides:
      primary-doc:
        seed_domains:
          - "obsoletecomputermuseum.org"
          - "oldcomputers.net"
          - "computerhistory.org"
        query_templates:
          - '"obsolete system" "{links_direction}" manual'
          - '"forgotten machine" "{primary_term}" documentation'
          - '"dead standard" protocol OR specification'
      enthusiast-research:
        seed_domains:
          - "calpaterson.com"
          - "vcfed.org"
          - "oldcomputers.net"
          - "gamesx.com"
          - "120years.net"
        query_templates:
          - '"obsolete system" collector OR restoration'
          - '"legacy hardware" "oral history"'
          - '"forgotten technology" "field notes" OR teardown'
          - '"arcade hardware" repair OR teardown'
          - '"electronic instrument" restoration OR notes'
      old-web:
        seed_domains:
          - "textfiles.com"
          - "oldcomputers.net"
          - "gamesx.com"
        query_templates:
          - '"obsolete computer" "personal site"'
          - '"dead standard" homepage OR webring'
          - '"bank python" "oral history"'
          - '"game console" "service manual"'
      museum-object:
        seed_urls:
          - "https://120years.net/dubreq-stylophone/"
          - "https://archives.museumofplay.org/repositories/3/archival_objects/21782"
        seed_domains:
          - "computerhistory.org"
          - "obsoletecomputermuseum.org"
          - "museumofplay.org"
          - "designmuseum.org"
        query_templates:
          - '"triadex muse" "museum object"'
          - '"obsolete computer" "object record"'
          - '"forgotten machine" exhibit OR collection'
          - '"electronic instrument" exhibit OR collection'

  digital archaeology:
    preferred_lanes:
      - old-web
      - enthusiast-research
