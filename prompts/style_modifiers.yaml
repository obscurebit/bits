# Style Modifiers for Story Generation
# The goal is not random weirdness. The goal is to force the model into
# different social situations, voices, and emotional pressures each day.

pov:
  - "First person, unreliable but trying to sound reasonable"
  - "Third person close, tightly following one person's blind spots"
  - "Second person, intimate rather than gimmicky"
  - "Epistolary, but only if the form creates tension"
  - "Third person distant, almost reportorial"
  - "Multiple short first-person voices that disagree"
  - "Collective first person plural: we"
  - "Retrospective voice from years later, with selective honesty"
  - "Oral storytelling voice told to one listener"
  - "Instructional voice that gradually becomes personal"

tone:
  - "Dry, socially observant, quietly funny"
  - "Melancholic but unsentimental"
  - "Tense and claustrophobic"
  - "Playful, sideways, faintly ridiculous"
  - "Tender with a hard edge"
  - "Bitter, precise, and unimpressed"
  - "Plainspoken and devastating"
  - "Patient wonder grounded in material detail"
  - "Petty and sharp, where small grievances matter"
  - "Warmth curdling into unease"

era:
  - "Present day, ordinary and specific"
  - "Near future, familiar systems bent slightly out of shape"
  - "1990s early internet era"
  - "1970s analog bureaucracy"
  - "2010s, platform culture still feels fresh and invasive"
  - "1930s-1940s urban modernity"
  - "Ambiguous period with no flashy timestamps"
  - "Post-collapse, but focused on routine rather than rubble"
  - "Mid-century suburbia with social pressure baked in"
  - "Deep future where the strange is part of civic life"

setting:
  - "A cramped apartment building with thin walls"
  - "A municipal office, permit counter, or records room"
  - "A night bus, train platform, or transit interchange"
  - "A market, flea market, or traveling fair"
  - "A clinic, care home, or rehabilitation center"
  - "A school, staff room, or after-hours campus space"
  - "A kitchen during service"
  - "A garage, repair shop, or back-room workspace"
  - "A library, archive, or secondhand bookshop"
  - "A border crossing, checkpoint, or customs queue"
  - "A theater, rehearsal room, or backstage corridor"
  - "A neighborhood meeting, co-op, or union hall"
  - "A laundromat with broken change machines and a bulletin board"
  - "A storage unit corridor after hours"
  - "A basement workshop beneath a restaurant"
  - "A motel lobby during a weather delay"
  - "A ferry terminal cafeteria"
  - "A community college testing center"
  - "A pawn shop counter with too much fluorescent light"
  - "A hospital loading dock or supply corridor"
  - "A funeral home side office"
  - "A mobile phone repair kiosk in a mall"
  - "A nail salon between appointments"
  - "A tire shop waiting area"
  - "A church basement used for nonreligious meetings"
  - "A public pool locker room in the off-season"
  - "A self-checkout lane during a system outage"
  - "A food bank intake desk"
  - "A courthouse hallway outside small claims court"
  - "A hotel laundry room"
  - "A rural post office with one open window"
  - "A retirement community craft room"
  - "A parking garage booth"
  - "A port authority lost-and-found room"
  - "A wedding venue kitchen after the guests leave"
  - "A blood donation center waiting area"
  - "A city parks equipment shed"
  - "A thrift store sorting room"
  - "A bowling alley office behind the shoe counter"
  - "A pharmacy pickup line"
  - "A rooftop greenhouse maintained by tenants"
  - "A funeral reception in a rented community room"
  - "A bus depot vending machine alcove"
  - "A copy shop with one employee who knows every regular"
  - "A marina office during winter"
  - "A convention center coat check"
  - "A fire-damaged beauty supply store"
  - "A courthouse records scanner room"

structure:
  - "Linear scene with no wasted setup"
  - "Fragmented vignettes that earn their gaps"
  - "A list or inventory that exposes a life"
  - "Two short timelines rubbing against each other"
  - "One conversation carrying most of the story"
  - "A single continuous scene in real time"
  - "A story told through a sequence of objects"
  - "Brief sections marked by changing locations"
  - "A confession interrupted by practical concerns"
  - "A form, report, or note-taking structure that still feels dramatic"

conflict:
  - "A small lie that has become expensive to maintain"
  - "Two people need incompatible versions of the truth"
  - "Institutional rules colliding with ordinary kindness"
  - "A family obligation nobody can quite refuse"
  - "An embarrassing desire becoming impossible to hide"
  - "A task that should be simple but turns morally strange"
  - "Grief distorting what counts as reasonable"
  - "A bargain someone thought they understood"
  - "A petty dispute revealing a deeper fracture"
  - "Trying to explain something while sounding sane enough to be believed"

opening:
  - "Start with an object being handled under pressure"
  - "Start with dialogue in progress, no throat-clearing"
  - "Start with a rule, instruction, or posted notice"
  - "Start with someone arriving late to something important"
  - "Start with a sensory detail that implies a whole place"
  - "Start with a receipt, list, label, or schedule entry"
  - "Start with an action already failing"
  - "Start with a contradiction stated plainly"
  - "Start with a mundane errand taking a wrong turn"
  - "Start with a favor being asked badly"

genre:
  - "Quiet literary realism with one impossible pressure point"
  - "Workplace comedy with a speculative inconvenience"
  - "Domestic drama bent by one technological or metaphysical fact"
  - "Noir-ish social observation rather than detective plotting"
  - "Satire of systems, credentials, or institutional language"
  - "Ghost story energy without old haunted-house defaults"
  - "Character study where the strange thing stays partly offstage"
  - "Moral fable disguised as a very specific modern problem"
  - "Tender romance complicated by one impossible condition"
  - "Caper energy at a human scale"

wildcard:
  - "The story must contain one genuinely funny sentence"
  - "Nobody uses the speculative element as a metaphor out loud"
  - "One paragraph should hinge on a deeply boring object"
  - "The protagonist is mistaken about something important and never fully realizes it"
  - "Include one mundane financial detail"
  - "No one in the story is an inventor, scientist, or chosen one"
  - "The weirdest fact should be treated as socially inconvenient, not majestic"
  - "Let one supporting character steal a scene"
  - "Keep the speculative premise visible but not fully explained"
  - "Make one moment of kindness matter more than the reveal"

protagonist:
  - "A building super who knows too much about everyone's habits"
  - "A call-center worker on the edge of being replaced"
  - "A municipal clerk with one private obsession"
  - "A nurse, orderly, or caregiver making an ugly compromise"
  - "A repair technician with a side hustle"
  - "A teacher or adjunct trying to protect one student"
  - "A sibling who got stuck handling the family practicalities"
  - "A vendor, caterer, or cook working through a crowded shift"
  - "A union rep, shop steward, or committee volunteer"
  - "A teenager running errands for adults who tell partial truths"
  - "An actor, stage manager, or roadie who notices what others edit out"
  - "A retiree with time, suspicion, and one useful skill"
  - "A laundromat attendant who reads people by their stains"
  - "A night security guard studying for a licensing exam"
  - "A wedding photographer with too many backup drives"
  - "A rideshare driver with a strict rule about conversation"
  - "A court interpreter tired of softening other people's words"
  - "A pharmacy tech who knows which customers are lying"
  - "A funeral director's assistant who handles the awkward calls"
  - "A warehouse picker with a flawless memory for misplaced stock"
  - "A hotel housekeeper who keeps finding impossible guest notes"
  - "A debt collector trying to become a better person"
  - "A city arborist who tracks complaints by neighborhood"
  - "A substitute teacher who recognizes too many forged signatures"
  - "A mall kiosk repair worker with a drawer full of unclaimed phones"
  - "A community theater treasurer guarding a very small budget"
  - "A janitor at a courthouse who hears what lawyers practice aloud"
  - "A ferry deckhand who knows who travels under fake names"
  - "A food bank intake volunteer with a memory for repeated stories"
  - "A copy shop employee who sees every local scheme on paper"
  - "A parking enforcement officer hated for the wrong reasons"
  - "A notary public with one rule they keep breaking"
  - "A cemetery groundskeeper who tracks family feuds by flower choice"
  - "A nursing student working overnight registration"
  - "A thrift store sorter with an eye for altered labels"
  - "A small-claims plaintiff who has rehearsed too much"
  - "A boiler inspector with a sideline in favors"
  - "A translator for appliance manuals who suspects one brand is alive"
  - "A retired postal carrier still walking their old route"
  - "A dental receptionist who controls the cancellation list"
  - "A public pool manager guarding a secret lost-and-found"
  - "A city parks employee responsible for keys nobody admits exist"
  - "A motel front-desk clerk who can spot a fake emergency"
  - "A cafeteria cashier who knows what everyone cannot afford"
  - "A shipping clerk who recognizes handwriting better than faces"
  - "A bailiff trying not to take sides"
  - "A wedding caterer who has seen the family argument before"
  - "A repair apprentice covering for a boss who vanished mid-shift"

desire:
  - "They want to keep a promise that has become irrational"
  - "They want one quiet advantage nobody else has noticed yet"
  - "They need money by the end of the day"
  - "They want to avoid public embarrassment"
  - "They want to be forgiven without confessing the whole truth"
  - "They want to get through a routine shift without incident"
  - "They want to protect a fragile relationship"
  - "They want to stay useful in a system that is redesigning them out of it"
  - "They want proof, but not enough to destroy what they still love"
  - "They want to leave, but keep inventing reasons to stay"

anchor_object:
  - "A stained ledger"
  - "A counterfeit transit card"
  - "A cracked lunch thermos"
  - "An obsolete keycard on a fraying lanyard"
  - "A box of unsold raffle tickets"
  - "A dented nameplate from a demolished office"
  - "A stack of unsigned forms"
  - "A pair of work gloves with one finger missing"
  - "A receipt that keeps acquiring new line items"
  - "A rehearsal prop that should not feel warm"
  - "A maintenance logbook with two handwritings"
  - "A cheap plastic souvenir nobody remembers buying"
  - "A velvet ring box with no hinge"
  - "A parking ticket printed on the wrong date"
  - "A motel ice bucket full of numbered tags"
  - "A cracked barcode scanner"
  - "A roll of raffle tickets all numbered zero"
  - "A laminated menu with one dish scratched out"
  - "A drawer of unclaimed prescription bags"
  - "A brass mailbox key taped to a library card"
  - "A voicemail cassette labeled in three inks"
  - "A plastic pager that still receives apologies"
  - "A clipboard with a missing bottom corner"
  - "A jar of buttons sorted by former owner"
  - "A wedding seating chart covered in correction tape"
  - "A receipt spike bent into a spiral"
  - "A burned-out exit sign wrapped in bubble mailer"
  - "A grocery loyalty card with someone else's name"
  - "A dead remote control that changes labels"
  - "A cracked compact mirror from a lost-and-found box"
  - "A numbered deli ticket that no machine will call"
  - "A plastic wristband from a clinic that closed years ago"
  - "A shoebox of duplicate apartment keys"
  - "A postage scale that disagrees with every package"
  - "A laminated employee badge with the photo rubbed pale"
  - "A freezer bag of foreign coins and subway tokens"
  - "A folded fire escape map with an extra staircase"
  - "A chipped bowling trophy with the wrong winner engraved"
  - "A stack of carbon-copy invoices"
  - "A bus transfer punched with tomorrow's date"
  - "A cracked phone screen protector with a saved fingerprint"
  - "A handbell from a reception desk"
  - "A binder of warranty cards never mailed"
  - "A motel Bible with the room numbers crossed out"
  - "A dried corsage in a pharmacy bag"
  - "A pay stub with a job title nobody admits exists"
  - "A set of measuring spoons tied with dental floss"
  - "A plastic garment tag that keeps reattaching itself"

social_pressure:
  - "Everyone around them is acting as if this is normal, and that consensus has weight"
  - "Their workplace rewards obedience and punishes curiosity"
  - "A family member needs them to keep up a fiction for one more day"
  - "Neighbors, coworkers, or committee members are watching closely"
  - "There is a queue, and queues have their own morality"
  - "They owe a favor to the wrong person"
  - "Politeness is preventing anyone from naming the real problem"
  - "Institutional language is being used to hide something intimate"
  - "They are being judged by people with less at stake"
  - "The people benefiting most are not the ones making the decision"

ending_shape:
  - "End on a decisive action"
  - "End on a line of dialogue that changes the whole scene"
  - "End on a practical choice with moral residue"
  - "End on a joke that hurts a little"
  - "End on an image that feels earned, not vague"
  - "End on someone finally understanding the cost"
  - "End on a refusal"
  - "End on a transaction"
  - "End on a new rule being accepted or broken"
  - "End on a return to the opening detail with changed meaning"

banned_word_sets:
  - ["echo", "static", "hum", "shimmer", "pulse", "flicker", "whisper"]
  - ["signal", "frequency", "receiver", "dial", "monitor", "terminal", "screen"]
  - ["protocol", "archive", "chamber", "void", "nexus", "lattice", "threshold"]
  - ["ozone", "circuitry", "crackle", "hiss", "glow", "luminous", "radiant"]
  - ["artifact", "relic", "forgotten", "buried", "unearthed", "dormant", "ancient"]
  - ["quantum", "entangled", "superposition", "observer", "particle", "collapse", "decoherence"]
  - ["transmission", "broadcast", "antenna", "relay", "channel", "bandwidth", "spectrum"]
  - ["memory", "simulation", "glitch", "reality", "timeline", "paradox", "anomaly"]
