# Style Modifiers for Story Generation
# The goal is not random weirdness. The goal is to force the model into
# different social situations, voices, and emotional pressures each day.

pov:
  - "First person, unreliable but trying to sound reasonable"
  - "Third person close, tightly following one person's blind spots"
  - "Second person, intimate rather than gimmicky"
  - "Epistolary, but only if the form creates tension"
  - "Third person distant, almost reportorial"
  - "Multiple short first-person voices that disagree"
  - "Collective first person plural: we"
  - "Retrospective voice from years later, with selective honesty"
  - "Oral storytelling voice told to one listener"
  - "Instructional voice that gradually becomes personal"

tone:
  - "Dry, socially observant, quietly funny"
  - "Melancholic but unsentimental"
  - "Tense and claustrophobic"
  - "Playful, sideways, faintly ridiculous"
  - "Tender with a hard edge"
  - "Bitter, precise, and unimpressed"
  - "Plainspoken and devastating"
  - "Patient wonder grounded in material detail"
  - "Petty and sharp, where small grievances matter"
  - "Warmth curdling into unease"

voice_profile:
  - "Clean moral clarity under speculative pressure: plain sentences, exact choices, social consequence over spectacle"
  - "Lush conceptual compression: dense images, high idea load, emotions implied through objects and weather"
  - "Spare procedural dread: short factual movement, systems described calmly until the human cost appears"
  - "Domestic fabulism: ordinary rooms, family habits, and one impossible rule treated as household logistics"
  - "Hard-edged social satire: institutions behave absurdly, but everyone still has rent, pride, and errands"
  - "Melancholy cosmic scale in miniature: vast implications glimpsed through one small private loss"
  - "Wry conversational intelligence: nimble dialogue, social observation, and jokes that reveal status"
  - "Clinical body-and-system unease: biological detail, care ethics, consent, and discomfort kept precise"
  - "Noir civic decay: compromised people, dim public spaces, favors, debt, and procedural suspicion"
  - "Mythic compression in modern clothes: ritual logic, repeated gestures, and a simple surface hiding old force"
  - "Anthropological future realism: customs, taboos, work routines, and status rules explained through action"
  - "Elegant puzzle-box escalation: a crisp premise unfolds through reversals without becoming a lore dump"
  - "Plainspoken wonder: direct language, practical characters, and awe arriving as a side effect of work"
  - "Feral comic bureaucracy: forms, titles, queues, and policies become ridiculous without losing stakes"
  - "Tender machine intimacy: tools and systems become emotionally charged through dependency and care"
  - "Barbed domestic argument: speculative facts are revealed through resentment, money, chores, and loyalty"
  - "Austere philosophical parable: few characters, sharp situation, clean symbolic pressure, no sermon"
  - "Crowded social realism: many tiny class signals, workplace habits, local customs, and overheard judgments"
  - "Fragmented documentary texture: records, labels, notices, and testimony creating story through gaps"
  - "Sensory urban unease: streets, transit, retail counters, weather, and infrastructure making the uncanny tactile"
  - "Deadpan impossible premise: everyone discusses the absurd rule as if it is a scheduling problem"
  - "Quiet post-disaster routine: aftermath is background; maintenance, trade, and care carry the drama"
  - "Precise technological estrangement: one device or process is described exactly enough to become strange"
  - "Folkloric labor tale: workers preserve an impossible custom because it keeps the place functioning"
  - "Elegant dread by omission: avoid explaining the central force; let behavior and consequences outline it"
  - "Bright caper mechanics: quick reversals, practical problem-solving, social friction, and a clean payoff"
  - "Ironic public-service voice: official calm covering panic, affection, corruption, or grief"
  - "Philosophical workplace comedy: jokes emerge from people trying to apply rules to impossible facts"
  - "Tenderly skeptical first person: the narrator doubts themselves but notices others with compassion"
  - "Cold ledger realism: debts, inventories, signatures, quantities, and audits become emotional evidence"
  - "High-concept intimacy: the big idea matters only because it changes one relationship on the page"
  - "Soft uncanny pastoral: plants, weather, soil, animals, and seasonal routines bend quietly out of sense"
  - "Brisk golden-age problem energy: clear setup, inventive complication, decisive turn, minimal haze"
  - "New-wave interior drift: perception, memory, and environment blur while concrete objects stay sharp"
  - "Cyber-social grime: platforms, access, scams, repairs, and credentials create street-level pressure"
  - "Legalistic absurdism: contracts, testimony, clauses, and exceptions reveal a private wound"
  - "Materialist cosmic horror: vastness enters through supply chains, maintenance failures, and cheap rooms"
  - "Dry academic artifact: footnote energy, careful categorization, and one classification that will not hold"
  - "Myth rewritten as infrastructure: sacred patterns appear inside utilities, schedules, repairs, or permits"
  - "Psychological claustrophobia: one room, one pressure, one misread relationship, no easy explanation"
  - "Humane technological skepticism: tools are useful, damaging, intimate, and never simply evil"
  - "Satirical marketplace fable: price, trade, scarcity, and desire become supernatural bookkeeping"
  - "Oral-history realism: a communal voice, selective memory, gossip, and practical contradiction"
  - "Elegant ruin aesthetics: decayed systems, beautiful remnants, and characters too busy to admire them"
  - "Compressed adventure residue: the exciting event has already happened; the story is about the bill"
  - "Moral injury in plain language: someone does the necessary thing and cannot make it clean"
  - "Softly comic anti-epic: large forces arrive, but the characters care more about lunch, shifts, and favors"
  - "Recursive metafictional pressure: documents, performances, or stories change the conditions of reality"
  - "Public myth undercut by logistics: ceremony, belief, and awe tangled with cleanup, staffing, and forms"
  - "Caregiver speculative realism: bodily need, schedules, compromise, patience, and one impossible demand"
  - "Alienated consumer surrealism: product language, upgrades, warranties, and service scripts become uncanny"
  - "Blue-collar systems thinking: pipes, carts, tickets, locks, machines, and workarounds reveal the world"
  - "Elegant emotional restraint: the prose stays controlled while the situation becomes quietly devastating"
  - "Contrarian speculative irony: the obvious moral is wrong; the stranger practical choice is kinder"
  - "Civic ghost-story texture: haunting expressed as policy residue, local memory, and public inconvenience"
  - "Mathematical social pressure: patterns, counts, ratios, and rules matter because people exploit them"
  - "Dreamlike but concrete: surreal transitions anchored by precise objects, jobs, and bodily action"
  - "Sardonic future ethnography: the narrator explains bizarre norms with weary common sense"
  - "Hopeful repair fiction: broken systems remain broken, but one careful fix changes a human outcome"
  - "Compressed thriller logistics: time pressure, constrained options, and one physical object everyone needs"
  - "Mournful archival voice without nostalgia: preservation is practical, partial, and morally complicated"
  - "Satirical theological machinery: belief systems behave like customer service, software, or local government"
  - "Sensual object realism: texture, weight, smell, and handling reveal desire before anyone names it"
  - "Understated final-image fiction: every scene narrows toward one ordinary image made newly charged"

era:
  - "Present day, ordinary and specific"
  - "Near future, familiar systems bent slightly out of shape"
  - "1990s early internet era"
  - "1970s analog bureaucracy"
  - "2010s, platform culture still feels fresh and invasive"
  - "1930s-1940s urban modernity"
  - "Ambiguous period with no flashy timestamps"
  - "Post-collapse, but focused on routine rather than rubble"
  - "Mid-century suburbia with social pressure baked in"
  - "Deep future where the strange is part of civic life"

setting_family:
  - "Back-of-house workplace where unofficial rules matter more than posted rules"
  - "Public-service counter where strangers become temporary dependents"
  - "Domestic threshold where private life leaks into shared space"
  - "Transit limbo where people are delayed long enough to reveal themselves"
  - "Care institution where routine compassion collides with policy"
  - "Repair or maintenance space where broken things become social evidence"
  - "Retail or service environment where small transactions carry moral weight"
  - "Civic meeting place where consensus is both useful and coercive"
  - "Temporary shelter or hospitality space where nobody is fully at home"
  - "Storage, sorting, or intake space where discarded things keep histories"
  - "Education-adjacent space where rules are performed for exhausted people"
  - "Ceremonial support space where the public performance is already over"
  - "Border, checkpoint, or access-control space where identity becomes practical"
  - "Informal neighborhood infrastructure where favors substitute for authority"
  - "Specialized workroom where one ordinary tool has too much power"
  - "Shared building system where tenants, staff, and machinery negotiate quietly"

setting_texture:
  - "Noisy, overheated, and full of improvised labels"
  - "Too bright, over-cleaned, and faintly humiliating"
  - "Damp, cramped, and governed by handwritten corrections"
  - "Quiet in a way that makes every small sound socially important"
  - "Crowded with people pretending not to listen"
  - "Smelling of old paper, disinfectant, or reheated food"
  - "Held together by tape, favors, extension cords, and memory"
  - "Built for efficiency but used mostly for waiting"
  - "Full of obsolete equipment that everyone still depends on"
  - "Temporarily rearranged for a rule nobody can explain"
  - "Half public, half private, with no clean place to stand"
  - "Marked by routines so familiar no one notices their cruelty"
  - "Recently renovated in a way that broke something human"
  - "Lit by one bad fixture and one stubborn source of daylight"
  - "Clean on the surface, with evidence of shortcuts everywhere"
  - "Organized by containers, tags, slots, bins, and silent judgments"
  - "Running on a schedule everyone knows is already false"
  - "Full of waiting chairs arranged to prevent real conversation"
  - "Made intimate by bad acoustics and nowhere private to speak"
  - "Decorated for public friendliness but used for quiet enforcement"
  - "Too cold, too dry, and designed around a machine nobody trusts"
  - "Layered with old signage that contradicts the new instructions"
  - "Smaller than the number of people who need it to work"
  - "Smelling faintly of rain gear, toner, and someone else's lunch"
  - "Divided by counters, ropes, glass, or tape that everyone negotiates"
  - "Recently cleaned after something nobody wants to discuss"
  - "Full of personal belongings pretending to be temporary"
  - "Arranged so the person with the least power faces the room"

structure:
  - "Linear scene with no wasted setup"
  - "Fragmented vignettes that earn their gaps"
  - "A list or inventory that exposes a life"
  - "Two short timelines rubbing against each other"
  - "One conversation carrying most of the story"
  - "A single continuous scene in real time"
  - "A story told through a sequence of objects"
  - "Brief sections marked by changing locations"
  - "A confession interrupted by practical concerns"
  - "A form, report, or note-taking structure that still feels dramatic"

conflict_engine:
  - "Private deception becomes materially costly"
  - "Two legitimate needs require incompatible facts"
  - "A humane exception threatens a system people depend on"
  - "An ordinary obligation becomes impossible to complete honestly"
  - "A hidden desire creates practical consequences before anyone names it"
  - "A routine task exposes a moral debt"
  - "Grief changes what everyone is willing to call reasonable"
  - "A bargain keeps its wording but changes its social meaning"
  - "A petty dispute reveals a structural imbalance"
  - "Someone must sound credible while describing something unbelievable"
  - "A rule meant to protect people starts protecting the wrong thing"
  - "A shortcut becomes community practice and then community law"
  - "A favor is called in after everyone forgot its original price"
  - "Proof would solve the public problem and ruin the private one"
  - "A resource is scarce enough that kindness needs a budget"
  - "A person gains one advantage and must decide who else deserves it"
  - "The official fix makes the unofficial workaround impossible"
  - "Someone's harmless habit becomes evidence against them"
  - "A rule works only because everyone has been misusing it kindly"
  - "A private promise conflicts with a public duty"
  - "The person most harmed by the system is also keeping it functional"
  - "A mistake benefits the wrong person too much to correct easily"
  - "The obvious confession would transfer blame to someone weaker"
  - "A fragile alliance depends on continuing a shared misunderstanding"
  - "The group can solve the problem only by admitting it has been cheating"
  - "An act of mercy creates a precedent no one can afford"
  - "Someone must choose between being believed and being useful"
  - "The fairest option feels cruel because it arrives too late"
  - "A ritual keeps working after everyone stops believing in it"
  - "A necessary repair would erase proof of what happened"
  - "An outsider follows the stated rule and breaks the real one"
  - "Someone's competence makes them harder to rescue"
  - "A debt can be paid only in the currency that caused it"
  - "The speculative advantage expires before anyone can agree who owns it"

opening:
  - "Start with an object being handled under pressure"
  - "Start with dialogue in progress, no throat-clearing"
  - "Start with a rule, instruction, or posted notice"
  - "Start with someone arriving late to something important"
  - "Start with a sensory detail that implies a whole place"
  - "Start with a receipt, list, label, or schedule entry"
  - "Start with an action already failing"
  - "Start with a contradiction stated plainly"
  - "Start with a mundane errand taking a wrong turn"
  - "Start with a favor being asked badly"

genre:
  - "Quiet literary realism with one impossible pressure point"
  - "Workplace comedy with a speculative inconvenience"
  - "Domestic drama bent by one technological or metaphysical fact"
  - "Noir-ish social observation rather than detective plotting"
  - "Satire of systems, credentials, or institutional language"
  - "Ghost story energy without old haunted-house defaults"
  - "Character study where the strange thing stays partly offstage"
  - "Moral fable disguised as a very specific modern problem"
  - "Tender romance complicated by one impossible condition"
  - "Caper energy at a human scale"

wildcard:
  - "The story must contain one genuinely funny sentence"
  - "Nobody uses the speculative element as a metaphor out loud"
  - "One paragraph should hinge on a deeply boring object"
  - "The protagonist is mistaken about something important and never fully realizes it"
  - "Include one mundane financial detail"
  - "No one in the story is an inventor, scientist, or chosen one"
  - "The weirdest fact should be treated as socially inconvenient, not majestic"
  - "Let one supporting character steal a scene"
  - "Keep the speculative premise visible but not fully explained"
  - "Make one moment of kindness matter more than the reveal"

protagonist_archetype:
  - "Service worker with informal knowledge that management undervalues"
  - "Caretaker responsible for both people and a failing system"
  - "Clerk, dispatcher, or coordinator who controls a small but meaningful gate"
  - "Repair-minded person who understands process better than authority does"
  - "Family fixer stuck translating emotion into logistics"
  - "Temporary worker who sees a permanent truth others miss"
  - "Committee volunteer or union-adjacent organizer with limited leverage"
  - "Young person doing adult errands inside partial information"
  - "Performer, technician, or support worker who notices staged reality"
  - "Older person whose usefulness comes from memory and suspicion"
  - "Driver, carrier, or runner who knows the city through repeated routes"
  - "Interpreter, notary, witness, or registrar caught between versions of truth"
  - "Sorter, picker, archivist, or intake worker who reads patterns in leftovers"
  - "Collector of small debts trying to become less cruel"
  - "Public-facing employee blamed for rules they did not make"
  - "Apprentice or assistant covering for an absent authority"

protagonist_pressure:
  - "They know too much because nobody thinks their job counts as knowing"
  - "They are competent in a role everyone treats as temporary"
  - "They need to protect one person without becoming publicly responsible"
  - "They are trying to stay useful while a system redesigns them out"
  - "They owe someone a favor and resent that it still matters"
  - "They have one private skill that would embarrass them if named"
  - "They are tired of softening other people's language"
  - "They are guarding a tiny budget, deadline, or margin of error"
  - "They are being judged by people who do not understand the work"
  - "They are trying not to take sides and failing quietly"
  - "They remember a previous version of the rule and what it cost"
  - "They have rehearsed the confrontation too often to sound natural"
  - "They want to do the generous thing without inviting a precedent"
  - "They are covering for someone who may not deserve it"
  - "They can solve the immediate problem only by creating a future one"
  - "They are almost ready to leave, which makes them dangerous"
  - "They have been promoted just enough to lose everyone's sympathy"
  - "They are responsible for a rule they privately hate"
  - "They are the only person who remembers why the old workaround existed"
  - "They cannot afford to be generous and cannot bear to be fair"
  - "They are good at the part of the job that is not in the job description"
  - "They are trusted only when they pretend not to know too much"
  - "They need one person to misunderstand them for a little longer"
  - "They are trying to make a clean exit from a messy obligation"
  - "They have mistaken endurance for loyalty for too long"
  - "They are embarrassed by how badly they want official recognition"
  - "They know the procedure is wrong but need the paycheck it protects"
  - "They are managing a private crisis through public competence"

desire:
  - "They want to keep a promise that has become irrational"
  - "They want one quiet advantage nobody else has noticed yet"
  - "They need money by the end of the day"
  - "They want to avoid public embarrassment"
  - "They want to be forgiven without confessing the whole truth"
  - "They want to get through a routine shift without incident"
  - "They want to protect a fragile relationship"
  - "They want to stay useful in a system that is redesigning them out of it"
  - "They want proof, but not enough to destroy what they still love"
  - "They want to leave, but keep inventing reasons to stay"

object_family:
  - "A mundane access object: card, key, badge, ticket, stamp, or wristband"
  - "A posted document: menu, notice, schedule, map, form, sign, or chart"
  - "A record-keeping object: ledger, logbook, receipt, invoice, queue slip, or label"
  - "A worn personal tool: glove, scanner, phone, pager, thermos, clipboard, or remote"
  - "A container of leftovers: drawer, shoebox, envelope, jar, bag, bin, or case"
  - "A ceremonial support object: prop, trophy, bell, seating chart, corsage, or ring box"
  - "A damaged measuring object: scale, counter, meter, timer, gauge, or tally device"
  - "A household object used in public: utensil, mirror, garment tag, appliance part, or souvenir"
  - "An obsolete communication object: cassette, pager, transfer, printout, terminal scrap, or handset"
  - "A proof-of-status object: badge, pay stub, certificate, pass, docket, or reservation"
  - "A repair remnant: bent hardware, spare part, taped diagram, warranty card, or maintenance tag"
  - "A small exchange object: coin, raffle ticket, token, coupon, loyalty card, or tip slip"

object_behavior:
  - "It changes only when someone has a material stake in the change"
  - "It records an extra detail nobody admits providing"
  - "It makes private obligations visible in public notation"
  - "It works correctly for the wrong person"
  - "It refuses to recognize a distinction everyone relies on"
  - "It gains, loses, or reorders markings according to social pressure"
  - "It answers a practical question and creates an ethical one"
  - "It preserves a version of events that is useful but not fully true"
  - "It turns a boring procedure into a limited supernatural resource"
  - "It behaves as if consensus matters more than physics"
  - "It makes debts easier to calculate and harder to forgive"
  - "It lets one person cheat until the cheat becomes infrastructure"
  - "It responds to care, neglect, or handling rather than commands"
  - "It exposes who benefits from the official story"
  - "It makes a future consequence appear as present paperwork"
  - "It solves a logistical problem by damaging a relationship"
  - "It grants access according to need, not authorization"
  - "It updates itself only after someone lies politely"
  - "It treats apologies, signatures, payments, or promises as interchangeable"
  - "It stores the version of events everyone performed, not the one that happened"
  - "It becomes more accurate when handled by the least powerful person"
  - "It subtracts something small each time it solves a problem"
  - "It makes a private compromise look like official policy"
  - "It counts emotional labor as a billable or transferable quantity"
  - "It refuses to move forward until someone names the real relationship"
  - "It preserves mistakes better than corrections"
  - "It assigns ownership according to who last felt responsible"
  - "It turns repeated convenience into binding precedent"
  - "It changes scale: a tiny mark creates a building-wide consequence"
  - "It recognizes care, resentment, or shame as valid input"
  - "It answers only questions that cost the asker something"
  - "It makes informal agreements enforceable in embarrassing ways"
  - "It quietly repairs itself by worsening a nearby human arrangement"
  - "It records what people meant to do instead of what they did"

relationship_pressure:
  - "Two coworkers need each other but disagree about what the job owes them"
  - "A relative asks for help in a way that hides the real request"
  - "A stranger becomes responsible for another stranger by accident"
  - "A supervisor and subordinate both know the official story is false"
  - "Neighbors enforce a custom nobody voted on"
  - "A former friend uses shared history as leverage"
  - "A customer, patient, client, or tenant is both right and unbearable"
  - "A group must decide whether fairness means equality or triage"
  - "A romance, friendship, or alliance depends on not naming the benefit"
  - "Someone absent shapes every conversation more than the people present"
  - "A child, elder, or dependent understands the stakes too clearly"
  - "A community protects its secret by mistreating one useful person"
  - "Two people share a secret but disagree about whether it was kindness"
  - "Someone mistakes another person's competence for consent"
  - "An old obligation has survived longer than the affection that created it"
  - "A practical partnership is becoming emotional at the worst possible time"
  - "A subordinate protects a superior who will never notice the sacrifice"
  - "A family member treats logistics as proof of love"
  - "A group keeps forgiving the person who makes the system legible"
  - "Two strangers briefly understand each other better than their own families do"
  - "Someone needs an apology but can only safely ask for a receipt, favor, or form"
  - "A friendship depends on never comparing who has given more"
  - "One person wants justice while another only wants the day to end"
  - "The person enforcing the rule is also the person most trapped by it"
  - "A former ally returns with a practical problem and moral leverage"
  - "A caretaker and dependent are both pretending the dependency goes one way"
  - "A group decision hides one person's private loss"
  - "Someone is loved for being useful and knows the difference"
  - "A public embarrassment would be easier to survive than a private gratitude"
  - "Two people are negotiating money because the real subject is loyalty"

social_pressure:
  - "Everyone around them is acting as if this is normal, and that consensus has weight"
  - "Their workplace rewards obedience and punishes curiosity"
  - "A family member needs them to keep up a fiction for one more day"
  - "Neighbors, coworkers, or committee members are watching closely"
  - "There is a queue, and queues have their own morality"
  - "They owe a favor to the wrong person"
  - "Politeness is preventing anyone from naming the real problem"
  - "Institutional language is being used to hide something intimate"
  - "They are being judged by people with less at stake"
  - "The people benefiting most are not the ones making the decision"

ending_shape:
  - "End on a decisive action"
  - "End on a line of dialogue that changes the whole scene"
  - "End on a practical choice with moral residue"
  - "End on a joke that hurts a little"
  - "End on an image that feels earned, not vague"
  - "End on someone finally understanding the cost"
  - "End on a refusal"
  - "End on a transaction"
  - "End on a new rule being accepted or broken"
  - "End on a return to the opening detail with changed meaning"

banned_word_sets:
  - ["echo", "static", "hum", "shimmer", "pulse", "flicker", "whisper"]
  - ["signal", "frequency", "receiver", "dial", "monitor", "terminal", "screen"]
  - ["protocol", "archive", "chamber", "void", "nexus", "lattice", "threshold"]
  - ["ozone", "circuitry", "crackle", "hiss", "glow", "luminous", "radiant"]
  - ["artifact", "relic", "forgotten", "buried", "unearthed", "dormant", "ancient"]
  - ["quantum", "entangled", "superposition", "observer", "particle", "collapse", "decoherence"]
  - ["transmission", "broadcast", "antenna", "relay", "channel", "bandwidth", "spectrum"]
  - ["memory", "simulation", "glitch", "reality", "timeline", "paradox", "anomaly"]
