name: Render Book PDFs

on:
  workflow_dispatch:
    inputs:
      theme:
        description: "Book theme to render"
        type: choice
        options:
          - both
          - light
          - dark
        default: both
      pdf_profile:
        description: "PDF image profile to render"
        type: choice
        options:
          - download
          - print
          - review
          - all
        default: download
  push:
    branches:
      - main
    paths:
      - ".github/workflows/render-book.yml"
      - "book/source/volume-1/**"
      - "docs/bits/posts/**"
      - "scripts/book_build.py"
      - "scripts/book_render.py"

permissions:
  contents: read

jobs:
  render:
    runs-on: ubuntu-latest
    env:
      THEME: ${{ inputs.theme || 'both' }}
      PDF_PROFILE: ${{ inputs.pdf_profile || 'download' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Install dependencies
        run: |
          uv venv
          uv pip install --python .venv/bin/python -r requirements.txt

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
          install-dependencies: true

      - name: Build book source artifacts
        run: uv run --python .venv/bin/python scripts/book_build.py --allow-incomplete

      - name: Render PDFs
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: |
          if [[ "$PDF_PROFILE" == "all" ]]; then
            for profile in download print review; do
              uv run --python .venv/bin/python scripts/book_render.py --theme "$THEME" --format pdf --allow-incomplete --pdf-profile "$profile"
            done
          else
            uv run --python .venv/bin/python scripts/book_render.py --theme "$THEME" --format pdf --allow-incomplete --pdf-profile "$PDF_PROFILE"
          fi

      - name: Upload book artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 256-bits-volume-1-${{ env.PDF_PROFILE }}-${{ github.run_number }}
          if-no-files-found: error
          retention-days: 14
          path: |
            book/output/volume-1/256-bits-volume-1-*.html
            book/output/volume-1/256-bits-volume-1-*.pdf
            book/output/volume-1/qr-targets.csv
            book/output/volume-1/source-manifest.json
            book/output/volume-1/validation-report.md
